name: ci
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: make setup
      - run: make lint
      - run: make check
      # dependency-heavy template suites (apache-beam, apache-airflow, duckdb, fastapi,
      # google-cloud-*) self-skip via importorskip unless those extras are installed here,
      # so CI green = lint + conformance + all runnable (mostly stdlib) template tests.
      - run: make test
