name: cloud-verify

# Automated, intern-side acceptance checks that run against YOUR OWN GCP project.
# When you push work under templates/**, this fires, figures out which task folder
# changed, and runs that task's acceptance check from checks/<stage>/<task>.sh.
#
# It needs GCP credentials, which you configure once in YOUR FORK — see
# docs/CI_CLOUD_TESTING.md. Without those secrets it skips (never a confusing red X).
#
# The separate `ci` workflow (lint + structure + local tests) always runs and needs
# no cloud access; this one is the real "did it work on the cloud?" check.

on:
  push:
    paths:
      - 'templates/**'
  workflow_dispatch:
    inputs:
      task:
        description: 'Task folder to check, e.g. templates/01-ingestion/initial-load-to-bigquery'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write   # not needed for key auth; leaves the door open for Workload Identity later

jobs:
  cloud-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history so we can diff what changed

      - name: Is GCP auth configured?
        id: guard
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "${GCP_SA_KEY:-}" ]; then
            echo "no_auth=true" >> "$GITHUB_OUTPUT"
            echo "::warning::No GCP_SA_KEY secret found. Follow docs/CI_CLOUD_TESTING.md to enable cloud checks in your fork. Skipping."
          else
            echo "no_auth=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Which task folders changed?
        id: tasks
        env:
          TASK_INPUT: ${{ github.event.inputs.task }}   # via env — never interpolated into the shell
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          set -uo pipefail
          if [ -n "${TASK_INPUT:-}" ]; then
            printf '%s\n' "${TASK_INPUT}" > /tmp/tasks.txt
          else
            # On a first push / force-push / dispatch, BEFORE is empty or all-zeros and a plain
            # diff would error and silently check nothing. Fall back to the previous commit, or
            # the empty tree if there is no parent, so a first commit still gets verified.
            base="${BEFORE:-}"
            if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
              base="$(git rev-parse HEAD~1 2>/dev/null || git hash-object -t tree /dev/null)"
            fi
            git diff --name-only "${base}" "${SHA}" 2>/dev/null \
              | grep -oE 'templates/[0-9]{2}-[^/]+/[^/]+' \
              | sort -u > /tmp/tasks.txt || true
          fi
          n="$(grep -c . /tmp/tasks.txt || true)"
          echo "count=${n}" >> "$GITHUB_OUTPUT"
          echo "Changed task folders:"; cat /tmp/tasks.txt || true

      - name: Authenticate to Google Cloud
        if: steps.guard.outputs.no_auth == 'false' && steps.tasks.outputs.count != '0'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        if: steps.guard.outputs.no_auth == 'false' && steps.tasks.outputs.count != '0'
        uses: google-github-actions/setup-gcloud@v2

      - name: Run acceptance checks for the changed tasks
        if: steps.guard.outputs.no_auth == 'false' && steps.tasks.outputs.count != '0'
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET: ${{ secrets.GCP_DATASET }}
        run: |
          set -uo pipefail
          rc=0
          while read -r taskpath; do
            [ -n "${taskpath}" ] || continue
            check="checks/${taskpath#templates/}.sh"
            if [ -f "${check}" ]; then
              echo "::group::${check}"
              bash "${check}" || rc=1
              echo "::endgroup::"
            else
              echo "No acceptance check yet for ${taskpath} (looked for ${check}) — skipping."
            fi
          done < /tmp/tasks.txt
          exit "${rc}"
