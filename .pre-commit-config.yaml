repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
  - repo: local
    hooks:
      - id: template-conformance
        name: template conformance (make check)
        entry: make
        args: ["check"]
        language: system
        pass_filenames: false
